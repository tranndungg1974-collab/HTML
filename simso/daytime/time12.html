<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Thời Gian Đã Trôi Qua</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        .input-group {
            margin: 20px 0;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="datetime-local"] {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #ff5252;
        }
        .result {
            margin-top: 30px;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 12px;
            font-size: 18px;
            line-height: 2;
        }
        .time-unit {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
        }
        .now {
            text-align: center;
            margin: 15px 0;
            font-size: 15px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏱️ Tính Thời Gian Đã Trôi Qua</h1>
        
        <div class="input-group">
            <label for="startTime">Chọn thời gian bắt đầu:</label>
            <input type="datetime-local" id="startTime" required>
        </div>

        <button onclick="calculateTime()">Tính toán ngay</button>
        <button onclick="useNow()" style="background: #4ecdc4; margin-top: 10px;">
            Dùng thời gian hiện tại
        </button>

        <div class="now">
            Thời gian hiện tại: <span id="currentTime"></span>
        </div>

        <div class="result" id="result" style="display: none;">
            <h2>Kết quả:</h2>
            <div id="timeDisplay"></div>
        </div>
    </div>

    <script>
        // Cập nhật thời gian hiện tại
        function updateCurrentTime() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            };
            document.getElementById('currentTime').textContent = now.toLocaleDateString('vi-VN', options);
        }

        // Tính thời gian đã trôi qua
        function calculateTime() {
            const startInput = document.getElementById('startTime').value;
            if (!startInput) {
                alert("Vui lòng chọn thời gian bắt đầu!");
                return;
            }

            const startTime = new Date(startInput);
            const now = new Date();
            
            if (startTime > now) {
                alert("Thời gian bắt đầu không được sau thời gian hiện tại!");
                return;
            }

            let diffMs = now - startTime;
            
            // Tính các đơn vị
            const seconds = Math.floor(diffMs / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            
            // Tính năm và tháng xấp xỉ
            const years = Math.floor(days / 365.25);
            const months = Math.floor((days % 365.25) / 30.44);
            const remainingDays = Math.floor(days % 30.44);
            
            const remainingHours = hours % 24;
            const remainingMinutes = minutes % 60;
            const remainingSeconds = seconds % 60;

            // Hiển thị kết quả
            let html = `
                <div class="time-unit"><span><strong>${years}</strong> năm</span></div>
                <div class="time-unit"><span><strong>${months}</strong> tháng</span></div>
                <div class="time-unit"><span><strong>${remainingDays}</strong> ngày</span></div>
                <div class="time-unit"><span><strong>${remainingHours}</strong> giờ</span></div>
                <div class="time-unit"><span><strong>${remainingMinutes}</strong> phút</span></div>
                <div class="time-unit"><span><strong>${remainingSeconds}</strong> giây</span></div>
                <hr>
                <div style="text-align:center; margin-top:15px; font-size:14px;">
                    Tổng: ${days.toLocaleString('vi-VN')} ngày
                </div>
            `;

            document.getElementById('timeDisplay').innerHTML = html;
            document.getElementById('result').style.display = 'block';
        }

        // Đặt thời gian hiện tại vào input
        function useNow() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            const datetimeStr = `${year}-${month}-${day}T${hours}:${minutes}`;
            document.getElementById('startTime').value = datetimeStr;
            calculateTime();
        }

        // Khởi tạo
        window.onload = function() {
            updateCurrentTime();
            setInterval(updateCurrentTime, 1000);
            
            // Đặt giá trị mặc định là 1 ngày trước
            const defaultTime = new Date();
            defaultTime.setDate(defaultTime.getDate() - 1);
            
            const year = defaultTime.getFullYear();
            const month = String(defaultTime.getMonth() + 1).padStart(2, '0');
            const day = String(defaultTime.getDate()).padStart(2, '0');
            const hours = String(defaultTime.getHours()).padStart(2, '0');
            const minutes = String(defaultTime.getMinutes()).padStart(2, '0');
            
            document.getElementById('startTime').value = `${year}-${month}-${day}T${hours}:${minutes}`;
            
            // Tính ngay khi load
            setTimeout(() => {
                calculateTime();
            }, 500);
        };
    </script>
</body>
</html>
