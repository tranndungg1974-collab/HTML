<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Mint Token Polygon - Multi Contract</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: system-ui, sans-serif; background: #0f1115; color: #e6e6e6; display: flex; justify-content: center; padding: 40px 16px; }
    .card { background: #1a1d24; padding: 24px; border-radius: 16px; width: 100%; max-width: 480px; border: 1px solid #2a2f3a; }
    h2 { margin: 0 0 16px; font-size: 22px; }
    label { display: block; margin: 16px 0 6px; font-weight: 600; font-size: 14px; color: #9aa4b2; }
    input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #2a2f3a; background: #0f1115; color: #fff; font-size: 15px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; margin-top: 20px; border: none; border-radius: 10px; background: #8247e5; color: white; font-weight: 600; font-size: 16px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .row { display: flex; gap: 12px; }
    .row button { margin-top: 0; }
    .status { margin-top: 16px; font-size: 14px; line-height: 1.5; word-break: break-all; }
    .warn { background: #2a1f00; border: 1px solid #5c4700; padding: 12px; border-radius: 10px; color: #ffcc66; font-size: 13px; margin-bottom: 16px; }
    .info { background: #1a2332; border: 1px solid #2a3f5a; padding: 12px; border-radius: 10px; color: #8ab4f8; font-size: 13px; margin-top: 16px; }
    a { color: #8ab4f8; }
    .small-btn { width: auto; padding: 8px 12px; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Mint Token Polygon</h2>
    <div class="warn">
      Hàm `0x40c10f19` = `mint(address)`. Chỉ ví có quyền MINTER của contract đó mới gọi được. Giao dịch revert nếu không có quyền.
    </div>
    
    <div class="row">
      <button id="connectBtn">Kết nối MetaMask</button>
    </div>
    
    <div id="account" class="status"></div>

    <label>Địa chỉ Token Contract</label>
    <input id="tokenAddress" value="0x758d1ea0935fdc2ad83e791b0bfc7d883697b73b" placeholder="0x...">
    <button id="loadContractBtn" class="small-btn">Load Contract</button>

    <div id="tokenInfo" class="info" style="display:none;"></div>

    <label>Địa chỉ nhận token</label>
    <input id="toAddress" placeholder="0x... ví nhận token">

    <button id="mintBtn" disabled>Mint sang địa chỉ trên</button>
    
    <div id="txStatus" class="status"></div>
  </div>

  <script type="module">
    import { ethers } from "https://cdn.jsdelivr.net/npm/ethers@6.13.0/+esm";

    const POLYGON_CHAIN_ID = "0x89"; // 137
    const MINT_ABI = [`function mint(address to)`, `function name() view returns (string)`, `function symbol() view returns (string)`, `function decimals() view returns (uint8)`];

    let provider, signer, contract, currentTokenAddress;

    const connectBtn = document.getElementById("connectBtn");
    const mintBtn = document.getElementById("mintBtn");
    const loadContractBtn = document.getElementById("loadContractBtn");
    const accountEl = document.getElementById("account");
    const txStatus = document.getElementById("txStatus");
    const tokenInfoEl = document.getElementById("tokenInfo");
    const tokenAddressInput = document.getElementById("tokenAddress");

    connectBtn.onclick = async () => {
      if (!window.ethereum) {
        accountEl.textContent = "Cài MetaMask trước đã bạn.";
        return;
      }
      try {
        await ethereum.request({ method: "eth_requestAccounts" });
        
        await ethereum.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: POLYGON_CHAIN_ID }]
        }).catch(async (err) => {
          if (err.code === 4902) {
            await ethereum.request({
              method: "wallet_addEthereumChain",
              params: [{
                chainId: POLYGON_CHAIN_ID,
                chainName: "Polygon Mainnet",
                nativeCurrency: { name: "MATIC", symbol: "MATIC", decimals: 18 },
                rpcUrls: ["https://polygon-rpc.com"],
                blockExplorerUrls: ["https://polygonscan.com"]
              }]
            });
          } else { throw err; }
        });

        provider = new ethers.BrowserProvider(window.ethereum);
        signer = await provider.getSigner();
        
        const addr = await signer.getAddress();
        accountEl.innerHTML = `Đã kết nối: ${addr.slice(0,6)}...${addr.slice(-4)}`;
        connectBtn.textContent = "Đã kết nối";
        
        // Auto load contract mặc định
        await loadContract();
      } catch (e) {
        accountEl.textContent = `Lỗi: ${e.message}`;
      }
    };

    async function loadContract() {
      const addr = tokenAddressInput.value.trim();
      if (!ethers.isAddress(addr)) {
        tokenInfoEl.style.display = "block";
        tokenInfoEl.textContent = "Địa chỉ contract không hợp lệ.";
        mintBtn.disabled = true;
        return;
      }
      
      if (!signer) {
        tokenInfoEl.style.display = "block";
        tokenInfoEl.textContent = "Kết nối ví trước đã.";
        return;
      }

      try {
        currentTokenAddress = addr;
        contract = new ethers.Contract(addr, MINT_ABI, signer);
        tokenInfoEl.style.display = "block";
        tokenInfoEl.textContent = "Đang load thông tin token...";
        
        // Thử đọc name, symbol để check contract có đúng ERC20 không
        const [name, symbol] = await Promise.all([
          contract.name().catch(() => "N/A"),
          contract.symbol().catch(() => "N/A")
        ]);
        
        tokenInfoEl.innerHTML = `
          <b>Contract:</b> <a target="_blank" href="https://polygonscan.com/address/${addr}">${addr.slice(0,10)}...${addr.slice(-8)}</a><br>
          <b>Tên:</b> ${name} | <b>Symbol:</b> ${symbol}<br>
          <b>Method:</b> mint(address)
        `;
        mintBtn.disabled = false;
        txStatus.textContent = "";
      } catch (e) {
        tokenInfoEl.textContent = `Không load được contract. Check lại địa chỉ hoặc ABI. Lỗi: ${e.message}`;
        mintBtn.disabled = true;
      }
    }

    loadContractBtn.onclick = loadContract;
    tokenAddressInput.onchange = () => { mintBtn.disabled = true; tokenInfoEl.style.display = "none"; };

    mintBtn.onclick = async () => {
      const to = document.getElementById("toAddress").value.trim();
      if (!ethers.isAddress(to)) {
        txStatus.textContent = "Địa chỉ nhận không hợp lệ.";
        return;
      }
      if (!contract) {
        txStatus.textContent = "Load contract trước đã.";
        return;
      }
      
      mintBtn.disabled = true;
      txStatus.textContent = "Đang gửi giao dịch...";
      
      try {
        const tx = await contract.mint(to);
        txStatus.innerHTML = `Đã gửi tx: <a target="_blank" href="https://polygonscan.com/tx/${tx.hash}">${tx.hash}</a><br>Chờ xác nhận...`;
        await tx.wait();
        txStatus.innerHTML += "<br><b>Thành công!</b> Token đã được mint.";
      } catch (e) {
        txStatus.textContent = `Thất bại: ${e.reason || e.message}`;
        console.error(e);
      } finally {
        mintBtn.disabled = false;
      }
    };
  </script>
</body>
</html>
